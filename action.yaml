name: "Summarize commits & send client email"
description: "Turn recent commits into a polished client-facing update email with OpenAI and send it via SMTP."
author: "Serbyte (Austin Serb)"

branding:
  icon: "mail"
  color: "blue"

inputs:
  openai-model:
    description: "OpenAI model to use for generating the client update summary."
    required: false
    default: "gpt-4o-mini"

  site-label:
    description: "Optional site or client label used in the email subject and content."
    required: false
    default: ""

outputs:
  email_body:
    description: "Generated HTML email body."

  summary_md:
    description: "Generated Markdown summary of recent commits."

runs:
  using: "node20"
  main: "dist/index.js"
